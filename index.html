<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plataforma</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css\index.css">
    <script src="js\index.js"></script>
</head>
<body>

    <div class="auth-wrapper">

        <!-- Encabezado -->
        <div class="auth-header">
            <h1>Ingreso a la plataforma</h1>
            <p>Por favor elija una opción</p>
        </div>

        <!-- Botones de selección -->
        <div class="tab-row">
            <button class="tab-btn active" onclick="switchTab('login')">Login</button>
            <button class="tab-btn" onclick="switchTab('registro')">Creación de cuenta</button>
        </div>

        <!-- Formulario: Login -->
        <div class="form-card active" id="form-login">
            <h2>Iniciar sesión</h2>

            <label for="login-correo">Correo electrónico</label>
            <input type="email" id="login-correo" name="correo" placeholder="ejemplo@correo.com" required>

            <label for="login-password">Contraseña</label>
            <input type="password" id="login-password" name="password" placeholder="••••••••" required>

            <button class="submit-btn" type="button">Iniciar sesión</button>
        </div>

        <!-- Formulario: Registro -->
        <div class="form-card" id="form-registro">
            <h2>Crear cuenta</h2>

            <label for="reg-username">Nombres y apellidos</label>
            <input type="text" id="reg-username" name="username" placeholder="Juan Pérez" required>

            <label for="reg-identificacion">Número de identificación</label>
            <input type="number" id="reg-identificacion" name="identificacion" placeholder="123456789" required>

            <label for="reg-email">Correo electrónico</label>
            <input type="email" id="reg-email" name="email" placeholder="ejemplo@correo.com" required>

            <label for="reg-password">Contraseña</label>
            <input type="password" id="reg-password" name="password" placeholder="••••••••" required>

            <label for="reg-telefono">Teléfono</label>
            <input type="tel" id="reg-telefono" name="telefono" placeholder="+57 300 000 0000" required>

            <label for="reg-nacionalidad">Nacionalidad</label>
            <input type="text" id="reg-nacionalidad" name="nacionalidad" placeholder="Colombiano/a" required>

            <button class="submit-btn" type="button">Registrarse</button>
        </div>

    </div>
</body>
</html>
