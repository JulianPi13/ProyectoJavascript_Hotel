<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/contacto.css">
</head>
<body>

    <div class="contacto-wrapper">

        <div class="contacto-header">
            <div class="header-icon">
                <img src="images/perfil-logo.png" alt="Contacto">
            </div>
            <h1 class="contacto-titulo">Contáctanos</h1>
        </div>

        <div class="datos-card">
            <h2 class="datos-titulo">Información de contacto</h2>

            <div class="dato-fila">
                <span class="dato-icono">✉</span>
                <div>
                    <span class="dato-label">Correo electrónico</span>
                    <span class="dato-valor">contacto.hotel.rincon@gmail.com</span>
                </div>
            </div>

            <div class="dato-fila">
                <span class="dato-icono">📞</span>
                <div>
                    <span class="dato-label">Teléfono</span>
                    <span class="dato-valor">+57 310 123 4567</span>
                </div>
            </div>

            <div class="dato-fila">
                <span class="dato-icono">📍</span>
                <div>
                    <span class="dato-label">Dirección</span>
                    <span class="dato-valor">Carrera 45 #123-45, Bogotá, Colombia</span>
                </div>
            </div>

            <div class="dato-fila">
                <span class="dato-icono">⏰</span>
                <div>
                    <span class="dato-label">Horario</span>
                    <span class="dato-valor">Lun - Vie 9:00 - 18:00</span>
                </div>
            </div>
        </div>

        <button class="boton" onclick="window.location.href='Inicio.html'">← Regresar al inicio</button>

    </div>
</body>
</html>
